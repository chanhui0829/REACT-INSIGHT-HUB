      <path d="M45 10C34.5 10 26 18.5 26 29C26 35.5 29.5 41 34.5 44.5C37.5 46.5 38.5 49 38.5 52H51.5C51.5 49 52.5 46.5 55.5 44.5C60.5 41 64 35.5 64 29C64 18.5 55.5 10 45 10Z" 
