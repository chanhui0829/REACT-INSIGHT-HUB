      <circle cx="45" cy="29" r="7.5" fill="#FFFFFF"/>
      
      <rect x="39.5" y="54" width="11" height="4" rx="2" fill="#059669"/>
      <rect x="41.5" y="60" width="7" height="4" rx="2" fill="#047857"/>
